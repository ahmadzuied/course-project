<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - جامعة الإسراء</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background-color: #f9f6ee;
      margin: 0;
      padding: 0;
      direction: rtl;
    }

    header {
      background-color: #5c4033;
      color: #fff;
      text-align: center;
      padding: 20px 0;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 100px);
    }

    .login-box {
      background-color: #fff;
      border: 2px solid #5c4033;
      border-radius: 12px;
      width: 350px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(92,64,51,0.2);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .login-box:hover {
      transform: scale(1.02);
    }

    .login-box h2 {
      color: #5c4033;
      margin-bottom: 25px;
      font-size: 22px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      background-color: #fdfaf3;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #5c4033;
      outline: none;
    }

    button {
      background-color: #5c4033;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #3e2a20;
    }

    #message {
      margin-top: 15px;
      color: #5c4033;
      font-weight: bold;
      font-size: 14px;
    }

    footer {
      text-align: center;
      color: #5c4033;
      font-size: 13px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>جامعة الإسراء</header>

  <div class="login-container">
    <div class="login-box">
      <h2>تسجيل الدخول</h2>
      <form id="loginForm">
        <input type="text" id="student_id" name="student_id" placeholder="الرقم الجامعي" required>
        <input type="password" id="password" name="password" placeholder="كلمة المرور" required>
        <button type="submit">دخول</button>
      </form>
      <p id="message"></p>
    </div>
  </div>

  <footer>© 2026 جامعة الإسراء - جميع الحقوق محفوظة</footer>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const student_id = document.getElementById("student_id").value;
      const password = document.getElementById("password").value;

      const formData = new URLSearchParams();
      formData.append("student_id", student_id);
      formData.append("password", password);

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: formData
        });

        // ✅ إذا السيرفر عمل redirect → ننتقل مباشرة
        if (res.redirected) {
          window.location.href = res.url;
        } else {
          document.getElementById("message").innerText = "❌ بيانات الدخول غير صحيحة";
        }
      } catch (err) {
        document.getElementById("message").innerText = "⚠️ خطأ في الاتصال بالسيرفر";
      }
    });
  </script>
</body>
</html>
