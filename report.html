<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>📊 تقرير الطالب</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background: linear-gradient(to right, #d2b48c, #f5f5dc);
      direction: rtl;
      margin: 0;
      padding: 0;
    }
    header {
      background: #5c4033;
      color: #fff;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 1px;
    }
    .container {
      background: #fff;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      width: 92%;
      max-width: 700px;
      margin: 30px auto;
    }
    h2 {
      color: #5c4033;
      margin-bottom: 25px;
      text-align: center;
      font-size: 22px;
      border-bottom: 2px solid #d2b48c;
      padding-bottom: 10px;
    }
    .section {
      margin-bottom: 25px;
      padding: 20px;
      border: 1px solid #d2b48c;
      border-radius: 10px;
      background: #fafafa;
    }
    .section h3 {
      margin-bottom: 15px;
      color: #5c4033;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section p {
      font-size: 16px;
      margin: 8px 0;
      line-height: 1.6;
    }
    .recommendation {
      font-size: 18px;
      font-weight: bold;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin-top: 20px;
    }
    .good { background: #e6ffe6; color: #228B22; border: 2px solid #228B22; }
    .average { background: #fff8dc; color: #DAA520; border: 2px solid #DAA520; }
    .poor { background: #ffe6e6; color: #B22222; border: 2px solid #B22222; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #d2b48c;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #d2b48c;
      color: #fff;
    }
    canvas { display: block; margin: 25px auto; }
  </style>
</head>
<body>
  <header>جامعة الإسراء</header>

  <div class="container">
    <h2>📊 تقرير الحضور للطالب</h2>

    <!-- بيانات الطالب -->
    <div class="section" id="studentInfo">
      <h3>👤 بيانات الطالب</h3>
      <div id="info"></div>
    </div>

    <!-- إحصائيات الحضور -->
    <div class="section" id="attendanceStats">
      <h3>📅 إحصائيات الحضور</h3>
      <div id="stats"></div>
      <canvas id="attendanceChart" width="280" height="280"></canvas>
    </div>

    <!-- جدول المحاضرات -->
    <div class="section">
      <h3>📖 تفاصيل المحاضرات</h3>
      <table>
        <thead>
          <tr>
            <th>📚 المادة</th>
            <th>📅 التاريخ</th>
            <th>⏰ الوقت</th>
          </tr>
        </thead>
        <tbody id="attendanceTable"></tbody>
      </table>
    </div>

    <!-- التوصية الذكية -->
    <div class="section" id="recommendationSection">
      <h3>💡 التوصية الذكية</h3>
      <div id="recommendation"></div>
    </div>
  </div>

  <footer style="text-align:center; color:#5c4033; font-size:13px; margin-top:10px;">
    © 2026 جامعة الإسراء - جميع الحقوق محفوظة
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // جلب رقم الطالب من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get("student_id");

    // ✅ استدعاء الـ API الصحيح
    fetch(`/report/${studentId}`)
      .then(res => res.json())
      .then(data => {
        // بيانات الطالب
        document.getElementById("info").innerHTML = `
          <p>👤 الاسم: ${data.name || "غير متوفر"}</p>
          <p>🎓 الكلية: ${data.college || "غير متوفر"}</p>
          <p>📚 التخصص: ${data.major || "غير متوفر"}</p>
          <p>🆔 الرقم الجامعي: ${data.student_id}</p>
        `;

        // إحصائيات الحضور
        document.getElementById("stats").innerHTML = `
          <p>📅 عدد المحاضرات التي حضرتها: ${data.attendance_count}</p>
          <p>📊 نسبة الحضور: ${data.percentage}%</p>
        `;

        // جدول المحاضرات
        let tableRows = "";
        data.records.forEach(r => {
          tableRows += `
            <tr>
              <td>${r.course_id}</td>
              <td>${r.date}</td>
              <td>${r.time}</td>
            </tr>
          `;
        });
        document.getElementById("attendanceTable").innerHTML = tableRows;

        // التوصية الذكية
        let levelClass = "";
        if(data.level === "ممتاز") levelClass = "good";
        else if(data.level === "متوسط") levelClass = "average";
        else levelClass = "poor";

        document.getElementById("recommendation").innerHTML = `
          <div class="recommendation ${levelClass}">
            ${data.recommendation}
          </div>
        `;

        // رسم بياني
        const ctx = document.getElementById('attendanceChart').getContext('2d');
        new Chart(ctx, {
          type: 'pie',
          data: {
            labels: ['حضور', 'غياب'],
            datasets: [{
              data: [data.percentage, 100 - data.percentage],
              backgroundColor: ['#228B22', '#B22222']
            }]
          },
          options: {
            responsive: false,
            plugins: {
              legend: { position: 'bottom' }
            }
          }
        });
      })
      .catch(err => {
        document.getElementById("info").innerHTML = `
          <p style="color:#B22222; font-weight:bold;">❌ خطأ في جلب التقرير</p>
        `;
      });
  </script>
</body>
</html>
