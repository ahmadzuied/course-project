<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>👨‍🏫 واجهة المحاضر</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background: linear-gradient(to right, #f5f5dc, #d2b48c);
      direction: rtl;
      margin: 0;
      padding: 0;
    }

    header {
      background: #5c4033;
      color: #fff;
      padding: 18px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .container {
      background: #fff;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 92%;
      max-width: 650px;
      margin: 40px auto;
      text-align: center;
    }

    h2 {
      color: #5c4033;
      margin-bottom: 25px;
      font-size: 22px;
      border-bottom: 2px solid #d2b48c;
      padding-bottom: 10px;
      display: inline-block;
    }

    button {
      background: #5c4033;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      margin: 10px;
      transition: 0.3s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button:hover {
      background: #8b5e3c;
      transform: scale(1.05);
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
      color: #5c4033;
    }
  </style>
</head>
<body>
  <header>جامعة الإسراء</header>

  <div class="container">
    <h2>👨‍🏫 مرحباً {{ name }}</h2>
    <p>رقم المحاضر: {{ teacher_id }}</p>

    <!-- زر فتح/إغلاق تسجيل الحضور -->
    <button onclick="toggleAttendance('open')">✅ فتح تسجيل الحضور</button>
    <button onclick="toggleAttendance('close')">❌ إغلاق تسجيل الحضور</button>

    <!-- حالة التسجيل -->
    <p id="status">🔄 جاري التحقق من حالة التسجيل...</p>

    <!-- زر تقارير الطلاب -->
    <button onclick="window.location.href='/teacher_reports_page?teacher_id={{ teacher_id }}'">
      📊 عرض تقارير الطلاب
    </button>
  </div>

  <script>
    // 🟢 دالة فتح/إغلاق تسجيل الحضور
    function toggleAttendance(action) {
      fetch("/toggle_attendance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: action })
      })
      .then(res => res.json())
      .then(data => {
        alert(data.message);
        loadStatus(); // تحديث الحالة بعد التغيير
      })
      .catch(() => alert("❌ خطأ في الاتصال بالسيرفر"));
    }

    // 🟢 دالة عرض حالة التسجيل
    function loadStatus() {
      fetch("/attendance_status")
        .then(res => res.json())
        .then(data => {
          document.getElementById("status").innerText = data.message;
        })
        .catch(() => {
          document.getElementById("status").innerText = "❌ خطأ في الاتصال بالسيرفر.";
        });
    }

    // 🟢 تحميل الحالة عند فتح الصفحة
    loadStatus();
  </script>
</body>
</html>
